name: Release dry run

on:
  workflow_dispatch:
  pull_request:
    paths:
      - releasebox.config.json
      - package.json
      - package-lock.json
      - .github/workflows/release*.yml
      - scripts/releasebox.mjs

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RELEASEBOX_REF: v0.1.0

jobs:
  dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test
      - name: Run smoke test
        run: npm run smoke --if-present
      - name: Verify ReleaseBox readiness
        run: npm run release:check
      - name: Preview npm package
        run: npm pack --dry-run
      - name: Release notes preview
        run: npm --silent run release:notes -- . > release-notes-preview.md
      - name: Publish release notes summary
        run: cat release-notes-preview.md >> "$GITHUB_STEP_SUMMARY"
